model:
  provider: openai-codex
  default: gpt-5.5
agent:
  reasoning_effort: xhigh
  gateway_timeout: 1800
  max_turns: 120
display:
  busy_input_mode: queue
  busy_ack_enabled: true
  status_messages: false
security:
  redact_secrets: true
office:
  role: owner-assistant
  repo: /root/home/ai-dev-office
  state: postgres
