model:
  provider: openai-codex
  default: gpt-5.5
agent:
  reasoning_effort: high
  gateway_timeout: 1200
  max_turns: 100
display:
  busy_input_mode: queue
  busy_ack_enabled: true
  status_messages: false
security:
  redact_secrets: true
office:
  role: materials-librarian
  repo: /root/home/ai-dev-office
  state: postgres
