routes:
  feature_development:
    department: development
    owner_outcome: implemented and reviewed code change
    primary_agent: dev-builder
    flow:
      - orchestrator
      - dev-builder
      - deterministic-checks
      - dev-reviewer
      - qa-lead
      - materials-librarian
      - owner-assistant
    qc_gate: code-and-acceptance
    approval: by-risk
  bugfix:
    department: development
    owner_outcome: verified bug fix
    primary_agent: dev-builder
    flow:
      - orchestrator
      - dev-builder
      - regression-check
      - dev-reviewer
      - qa-lead
      - owner-assistant
    qc_gate: regression
    approval: by-risk
  qa_review:
    department: quality-control
    owner_outcome: pass/fail/blocker decision
    primary_agent: qa-lead
    flow:
      - qa-lead
      - universal-qa
      - qc-result
    qc_gate: browser-and-deterministic
    approval: no
  material_save:
    department: materials-library
    owner_outcome: versioned material
    primary_agent: materials-librarian
    flow:
      - materials-librarian
      - storage
      - owner-assistant
    qc_gate: require-existing-pass
    approval: no
  daily_audit:
    department: quality-control
    owner_outcome: improvement report
    primary_agent: daily-auditor
    flow:
      - daily-auditor
      - incidents
      - events
      - qc-results
      - improvement-tasks
    qc_gate: none
    approval: before-route-change
  content_production:
    department: marketing
    owner_outcome: research-backed content draft ready for human approval
    primary_agent: seo-strategist
    flow:
      - orchestrator
      - seo-strategist
      - marketing-researcher
      - content-writer
      - seo-strategist
      - qa-lead
      - materials-librarian
      - owner-assistant
    qc_gate: content-and-facts
    approval: before-publication
  seo_brief:
    department: marketing
    owner_outcome: SEO brief with intent, structure, keywords, and risks
    primary_agent: seo-strategist
    flow:
      - seo-strategist
      - owner-assistant
    qc_gate: none
    approval: no
  marketing_research:
    department: marketing
    owner_outcome: source-backed research report
    primary_agent: marketing-researcher
    flow:
      - marketing-researcher
      - owner-assistant
    qc_gate: facts-and-sources
    approval: no
  content_rewrite:
    department: marketing
    owner_outcome: rewritten text aligned with style guide and SEO intent
    primary_agent: content-writer
    flow:
      - content-writer
      - seo-strategist
      - qa-lead
      - owner-assistant
    qc_gate: content-review
    approval: by-risk
  seo_review:
    department: marketing
    owner_outcome: SEO review and improvement list
    primary_agent: seo-strategist
    flow:
      - seo-strategist
      - owner-assistant
    qc_gate: none
    approval: no
  ad_campaign:
    department: marketing
    owner_outcome: advertising campaign plan or controlled launch checklist
    primary_agent: ads-specialist
    flow:
      - orchestrator
      - ads-specialist
      - security-officer
      - qa-lead
      - owner-assistant
    qc_gate: advertising-and-tracking
    approval: before-spend
  security_review:
    department: security
    owner_outcome: security risk assessment and go/no-go decision
    primary_agent: security-officer
    flow:
      - security-officer
      - owner-assistant
    qc_gate: security
    approval: by-risk
  release_security_gate:
    department: security
    owner_outcome: release security decision
    primary_agent: security-officer
    flow:
      - security-officer
      - qa-lead
      - owner-assistant
    qc_gate: security
    approval: yes
