services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-dev-office-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_dev_office}
      POSTGRES_USER: ${POSTGRES_USER:-ai_dev_office}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ai_dev_office_pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/002_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai_dev_office} -d ${POSTGRES_DB:-ai_dev_office}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ai_dev_office_pgdata:
